name: Terraform Apply

# Runs on push to main. Applies infra changes automatically.
# No manual approval gate here — for a portfolio dev environment this is
# fine. For a real prod environment, add a GitHub environment with required
# reviewers and reference :environment:production federated credential.

on:
  push:
    branches:
      - main
    paths:
      - 'infra/**'
      - '.github/workflows/terraform-apply.yml'
  workflow_dispatch:  # allow manual runs from the Actions tab

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: '1.9.5'
  WORKING_DIR: infra/envs/dev

jobs:
  apply:
    name: terraform apply
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        working-directory: ${{ env.WORKING_DIR }}
        env:
          ARM_USE_OIDC:         true
          ARM_CLIENT_ID:        ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID:        ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID:  ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: terraform init -input=false

      - name: Terraform validate
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform validate

      - name: Terraform apply
        working-directory: ${{ env.WORKING_DIR }}
        env:
          ARM_USE_OIDC:         true
          ARM_CLIENT_ID:        ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID:        ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID:  ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: terraform apply -auto-approve -input=false
