# ============================================================================
# Gold dim_time - Asset Bundle Job
# Hourly time dimension 2026-2028 (~17,544 rows).
# Scheduled at :55.
# ============================================================================

resources:
  jobs:
    gold_dim_time:
      name: "[${bundle.target}] Gold - dim_time"
      description: "Hourly time dimension covering 2026-01-01 to 2028-01-01 UTC."

      schedule:
        quartz_cron_expression: "0 55 * * * ?"
        timezone_id: "UTC"
        pause_status: PAUSED

      max_concurrent_runs: 1

      tasks:
        - task_key: gold_dim_time
          notebook_task:
            notebook_path: ../../src/gold/dim_time.py
            source: WORKSPACE
            base_parameters:
              catalog: ${var.catalog}

          max_retries: 2
          min_retry_interval_millis: 60000
          retry_on_timeout: true
          timeout_seconds: 600

      email_notifications:
        on_failure: []
        no_alert_for_skipped_runs: true
