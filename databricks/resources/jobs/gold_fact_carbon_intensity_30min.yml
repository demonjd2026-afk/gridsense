# ============================================================================
# Gold fact_carbon_intensity_30min - Asset Bundle Job
# ----------------------------------------------------------------------------
# UK carbon intensity fact at 30-min grain, sourced from silver.carbon_intensity
# and joined to dim_uk_region. Schedule :59 = after all dims (:50/:52/:53/:55)
# and after fact_generation_fuel_hourly (:57).
# ============================================================================

resources:
  jobs:
    gold_fact_carbon_intensity_30min:
      name: "[${bundle.target}] Gold - fact_carbon_intensity_30min"
      description: "UK carbon intensity fact: 30-min grain across 18 regions (forecast + actual)."

      schedule:
        quartz_cron_expression: "0 59 * * * ?"
        timezone_id: "UTC"
        pause_status: PAUSED

      max_concurrent_runs: 1

      tasks:
        - task_key: gold_fact_carbon_intensity_30min
          notebook_task:
            notebook_path: ../../src/gold/fact_carbon_intensity_30min.py
            source: WORKSPACE
            base_parameters:
              catalog: ${var.catalog}

          max_retries: 2
          min_retry_interval_millis: 60000
          retry_on_timeout: true
          timeout_seconds: 1800

      email_notifications:
        on_failure: []
        no_alert_for_skipped_runs: true
