# ============================================================================
# Gold fact_grid_hourly - Asset Bundle Job
# ----------------------------------------------------------------------------
# Integrated hourly fact: one row per (country_code, hour_utc) joining
# weather + generation + UK carbon, with fuel-mix-derived measures.
# Depends on silver.grid_state being current. Schedule :05 = after
# silver.grid_state's :02 run completes.
# Paused during the FinOps pause-during-accumulation window — run with
# `databricks bundle run gold_fact_grid_hourly -t dev`.
# ============================================================================

resources:
  jobs:
    gold_fact_grid_hourly:
      name: "[${bundle.target}] Gold - fact_grid_hourly"
      description: "Integrated star-schema fact: country x hour with weather, generation, and carbon measures."

      schedule:
        quartz_cron_expression: "0 5 * * * ?"
        timezone_id: "UTC"
        pause_status: PAUSED

      max_concurrent_runs: 1

      tasks:
        - task_key: gold_fact_grid_hourly
          notebook_task:
            notebook_path: ../../src/gold/fact_grid_hourly.py
            source: WORKSPACE
            base_parameters:
              catalog: ${var.catalog}

          max_retries: 2
          min_retry_interval_millis: 60000
          retry_on_timeout: true
          timeout_seconds: 1800

      email_notifications:
        on_failure: []
        no_alert_for_skipped_runs: true
