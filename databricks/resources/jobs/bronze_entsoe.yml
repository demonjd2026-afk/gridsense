# ============================================================================
# Bronze ENTSO-E - Asset Bundle Job
# Triggers entsoe_bronze.py hourly via serverless job compute.
# ============================================================================

resources:
  jobs:
    bronze_entsoe:
      name: "[${bundle.target}] Bronze - ENTSO-E"
      description: "Streams entsoe topic into bronze.entsoe (availableNow trigger, hourly schedule)."

      schedule:
        # Hourly at 15 minutes past. Staggered from open-meteo (:10).
        # ENTSO-E producer polls hourly too, so by :15 there should be one
        # fresh event per country waiting on the topic.
        quartz_cron_expression: "0 15 * * * ?"
        timezone_id: "UTC"
        pause_status: UNPAUSED

      max_concurrent_runs: 1

      tasks:
        - task_key: bronze_entsoe
          notebook_task:
            notebook_path: ../../src/bronze/entsoe_bronze.py
            source: WORKSPACE
            base_parameters:
              catalog: ${var.catalog}
              eh_namespace: ${var.eh_namespace}
              kafka_bootstrap: ${var.kafka_bootstrap}
              bronze_root: ${var.bronze_root}

          max_retries: 2
          min_retry_interval_millis: 60000
          retry_on_timeout: true
          timeout_seconds: 1800

      email_notifications:
        on_failure: []
        no_alert_for_skipped_runs: true
