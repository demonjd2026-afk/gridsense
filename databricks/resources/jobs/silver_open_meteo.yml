# ============================================================================
# Silver Open-Meteo - Asset Bundle Job
# Reads bronze.open_meteo, parses + validates + MERGEs into silver.weather.
# Scheduled at :30 (20 min after Bronze :10).
# ============================================================================

resources:
  jobs:
    silver_open_meteo:
      name: "[${bundle.target}] Silver - Open-Meteo"
      description: "Parse + validate + MERGE Bronze envelopes into silver.weather. Malformed rows -> quarantine."

      schedule:
        quartz_cron_expression: "0 30 * * * ?"
        timezone_id: "UTC"
        pause_status: UNPAUSED

      max_concurrent_runs: 1

      tasks:
        - task_key: silver_open_meteo
          notebook_task:
            notebook_path: ../../src/silver/open_meteo_silver.py
            source: WORKSPACE
            base_parameters:
              catalog: ${var.catalog}

          max_retries: 2
          min_retry_interval_millis: 60000
          retry_on_timeout: true
          timeout_seconds: 1800

      email_notifications:
        on_failure: []
        no_alert_for_skipped_runs: true
