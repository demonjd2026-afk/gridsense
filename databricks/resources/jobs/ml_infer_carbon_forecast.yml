# ============================================================================
# Phase 8.D.3 — Inference job
# ----------------------------------------------------------------------------
# PAUSED schedule (manual run for now). In production, this would run
# hourly so the agent always has fresh predictions; for now, manual.
# ============================================================================

resources:
  jobs:
    ml_infer_carbon_forecast:
      name: "[${bundle.target}] ML - Infer carbon forecast"
      description: "Loads registered ml.carbon_forecast_lgb and writes predictions to gold.fact_carbon_forecast. Phase 8.D.3."

      schedule:
        quartz_cron_expression: "0 0 0 1 1 ? 2099"   # never fires
        timezone_id: "UTC"
        pause_status: PAUSED

      max_concurrent_runs: 1

      tasks:
        - task_key: infer_carbon_forecast
          notebook_task:
            notebook_path: ../../src/ml/infer_carbon_forecast.py
            source: WORKSPACE
            base_parameters:
              catalog: ${var.catalog}
              model_name: "carbon_forecast_lgb"
              model_version: "latest"
              inference_days: "7"
              mode: "merge"

          max_retries: 0
          timeout_seconds: 600

      email_notifications:
        on_failure: []
        no_alert_for_skipped_runs: true

      tags:
        kind: ml-inference
        phase: "8.D.3"
