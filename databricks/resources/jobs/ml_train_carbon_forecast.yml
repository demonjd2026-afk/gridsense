# ============================================================================
# Phase 8.D.2 — Training job
# ----------------------------------------------------------------------------
# PAUSED schedule (manual run for now). When the model needs retraining
# (e.g. after new data accumulates), trigger manually.
# ============================================================================

resources:
  jobs:
    ml_train_carbon_forecast:
      name: "[${bundle.target}] ML - Train carbon forecast (LightGBM)"
      description: "Trains LightGBM on gold.feature_carbon_forecast, logs to MLflow, registers to Unity Catalog. Phase 8.D.2."

      schedule:
        quartz_cron_expression: "0 0 0 1 1 ? 2099"   # never fires
        timezone_id: "UTC"
        pause_status: PAUSED

      max_concurrent_runs: 1

      tasks:
        - task_key: train_carbon_forecast
          notebook_task:
            notebook_path: ../../src/ml/train_carbon_forecast.py
            source: WORKSPACE
            base_parameters:
              catalog: ${var.catalog}
              test_split_date: "2026-01-01"
              model_name: "carbon_forecast_lgb"
              register_model: "true"

          max_retries: 0
          timeout_seconds: 1200  # 20 minutes; training + registration fits well within

      email_notifications:
        on_failure: []
        no_alert_for_skipped_runs: true

      tags:
        kind: ml-training
        phase: "8.D.2"
