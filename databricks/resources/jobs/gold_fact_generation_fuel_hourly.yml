# ============================================================================
# Gold fact_generation_fuel_hourly - Asset Bundle Job
# ----------------------------------------------------------------------------
# First true star-schema fact. Explodes silver.generation.generation_mix
# into one row per (country, hour, fuel) and joins to all 3 Gold dims.
# Schedule :57 = after all 3 dims (:50/:52/:55).
# ============================================================================

resources:
  jobs:
    gold_fact_generation_fuel_hourly:
      name: "[${bundle.target}] Gold - fact_generation_fuel_hourly"
      description: "Star-schema fact: country x hour x fuel generation with lifecycle carbon estimates."

      schedule:
        quartz_cron_expression: "0 57 * * * ?"
        timezone_id: "UTC"
        pause_status: UNPAUSED

      max_concurrent_runs: 1

      tasks:
        - task_key: gold_fact_generation_fuel_hourly
          notebook_task:
            notebook_path: ../../src/gold/fact_generation_fuel_hourly.py
            source: WORKSPACE
            base_parameters:
              catalog: ${var.catalog}

          max_retries: 2
          min_retry_interval_millis: 60000
          retry_on_timeout: true
          timeout_seconds: 1800

      email_notifications:
        on_failure: []
        no_alert_for_skipped_runs: true
